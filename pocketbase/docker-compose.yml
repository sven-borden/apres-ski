# Coolify service for PocketBase (Apres-ski datastore).
# Deploy as a Coolify "Docker Compose" resource pointing at this directory.
# Coolify injects the proxy/domain; only the internal 8090 port is exposed.
services:
  pocketbase:
    build:
      context: .
      args:
        PB_VERSION: "0.39.3"
    restart: unless-stopped
    expose:
      - "8090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      # Persistent volume — survives redeploys. Holds SQLite db + uploads.
      - pb_data:/pb_data

volumes:
  pb_data:
