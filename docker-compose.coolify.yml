# Coolify deployment stack: Next.js app + PocketBase in one compose so they
# share a network. The app reaches PocketBase at http://pocketbase:8090 (the
# compose service name) — no cross-resource Docker DNS needed. PocketBase has
# no domain (internal-only); Coolify routes the public domain to `app`.
services:
  pocketbase:
    build:
      context: ./pocketbase
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - pb_data:/pb_data
    expose:
      - "8090"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_FIREBASE_API_KEY
        - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
        - NEXT_PUBLIC_FIREBASE_PROJECT_ID
        - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
        - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
        - NEXT_PUBLIC_FIREBASE_APP_ID
        - NEXT_PUBLIC_MS_CLARITY_PROJECT_ID
        - NEXT_PUBLIC_ESTIMATE_API_TOKEN
        - NEXT_PUBLIC_RECAPTCHA_V3_SITE_KEY
        - NEXT_PUBLIC_UMAMI_SRC
        - NEXT_PUBLIC_UMAMI_WEBSITE_ID
    restart: unless-stopped
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      # Internal service-name DNS within the compose network.
      - POCKETBASE_URL=http://pocketbase:8090
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    expose:
      - "3000"

volumes:
  pb_data:
